<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS Court Forms</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div id="mainApp" class="main-app">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <h1 class="app-title">GS Court Forms</h1>
                </div>
                <div class="header-right">
                    <span id="breadcrumb" class="breadcrumb"></span>
                </div>
            </header>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Left Sidebar: Client List (always visible) -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <button id="newClientBtn" class="btn btn-primary btn-full">+ New Client</button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="clientSearch" placeholder="Search clients...">
                    </div>
                    <div id="clientList" class="client-list"></div>
                </aside>

                <!-- Center Panel: Changes based on navigation state -->
                <main class="center-panel">

                    <!-- State: No client selected -->
                    <div id="viewNoClient" class="placeholder">
                        <p>Select a client or create a new one to get started</p>
                    </div>

                    <!-- State: Client selected — show matters -->
                    <div id="viewClient" style="display:none;">
                        <div class="panel-card">
                            <div class="panel-header">
                                <h2 id="clientHeaderName">Client Name</h2>
                                <button id="editClientBtn" class="btn btn-secondary btn-sm">Edit</button>
                            </div>
                            <div id="clientContactInfo" class="client-contact-info"></div>
                        </div>

                        <div class="panel-card">
                            <div class="panel-header">
                                <h2>Matters</h2>
                                <button id="newMatterBtn" class="btn btn-primary btn-sm">+ New Matter</button>
                            </div>
                            <div id="matterList" class="matter-list">
                                <p class="empty-state">No matters yet. Click "+ New Matter" to add one.</p>
                            </div>
                        </div>
                    </div>

                    <!-- State: Matter selected — show forms -->
                    <div id="viewMatter" style="display:none;">
                        <div class="panel-card">
                            <div class="panel-header">
                                <button id="backToClientBtn" class="btn btn-secondary btn-sm">&larr; Back</button>
                                <h2 id="matterHeaderName">Matter Name</h2>
                                <button id="editMatterBtn" class="btn btn-secondary btn-sm">Edit</button>
                            </div>
                            <div id="matterInfo" class="matter-info"></div>
                        </div>

                        <!-- Open Estate Wizard -->
                        <div id="openEstateWizard" class="panel-card wizard-card">
                            <div class="wizard-header">
                                <h3>Open Estate</h3>
                                <p class="wizard-subtitle">Answer these questions to load the correct forms</p>
                            </div>
                            <div class="wizard-questions">
                                <div class="wizard-row">
                                    <div class="wizard-question">
                                        <label>Administration</label>
                                        <div class="wizard-toggle" id="wizAdminType">
                                            <button type="button" class="wiz-btn" data-value="formal">Formal</button>
                                            <button type="button" class="wiz-btn" data-value="summary">Summary</button>
                                        </div>
                                    </div>
                                    <div class="wizard-question">
                                        <label>Will</label>
                                        <div class="wizard-toggle" id="wizWillType">
                                            <button type="button" class="wiz-btn" data-value="testate">Testate</button>
                                            <button type="button" class="wiz-btn" data-value="intestate">Intestate</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="wizard-row">
                                    <div class="wizard-question">
                                        <label>Jurisdiction</label>
                                        <div class="wizard-toggle" id="wizJurisdiction">
                                            <button type="button" class="wiz-btn" data-value="domiciliary">Domiciliary</button>
                                            <button type="button" class="wiz-btn" data-value="ancillary">Ancillary</button>
                                        </div>
                                    </div>
                                    <div class="wizard-question" id="wizPetitionerGroup">
                                        <label>Petitioners</label>
                                        <div class="wizard-toggle" id="wizPetitioners">
                                            <button type="button" class="wiz-btn" data-value="single">Single</button>
                                            <button type="button" class="wiz-btn" data-value="multiple">Multiple</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="wizard-row">
                                    <div class="wizard-question">
                                        <label>County</label>
                                        <select id="wizCounty" class="wiz-select">
                                            <option value="">Select county...</option>
                                            <option value="Broward">Broward</option>
                                            <option value="Palm Beach">Palm Beach</option>
                                            <option value="Miami-Dade">Miami-Dade</option>
                                            <option value="Other">Other</option>
                                        </select>
                                    </div>
                                    <div class="wizard-question wizard-action">
                                        <button type="button" id="wizLoadFormsBtn" class="btn btn-primary" disabled>Load Forms</button>
                                    </div>
                                </div>
                            </div>
                            <div id="wizFormList" class="wizard-form-list"></div>
                        </div>

                        <!-- Form Selector (advanced/manual) -->
                        <div class="panel-card">
                            <details class="form-selector-details">
                                <summary class="form-selector-toggle">Manual form selection</summary>
                                <div class="form-selector-multi">
                                    <div id="formBundles" class="form-bundles"></div>
                                    <div id="formChecklist" class="form-checklist"></div>
                                </div>
                            </details>
                        </div>

                        <!-- Form Fields -->
                        <div id="formFieldsSection" class="panel-card" style="display:none;">
                            <div id="selectedFormsSummary" class="selected-forms-summary"></div>
                            <div id="formFieldsContainer"></div>
                            <div class="form-actions">
                                <button id="generateDocBtn" class="btn btn-primary btn-full">Generate Documents (.zip)</button>
                            </div>
                        </div>
                    </div>

                </main>
            </div>
        </div>
    </div>

    <!-- New Client Modal -->
    <div id="newClientModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="clientModalTitle">New Client</h2>
                <button class="btn-close modal-close-btn">&times;</button>
            </div>
            <form id="clientForm" class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label for="clientFirstName">First Name</label>
                        <input type="text" id="clientFirstName">
                    </div>
                    <div class="form-group">
                        <label for="clientLastName">Last Name</label>
                        <input type="text" id="clientLastName">
                    </div>
                </div>
                <div class="form-group">
                    <label for="clientAddress">Address</label>
                    <textarea id="clientAddress" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="clientPhone">Phone</label>
                        <input type="tel" id="clientPhone">
                    </div>
                    <div class="form-group">
                        <label for="clientEmail">Email</label>
                        <input type="email" id="clientEmail">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary modal-close-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Client</button>
                </div>
            </form>
        </div>
    </div>

    <!-- New Matter Modal -->
    <div id="newMatterModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="matterModalTitle">New Matter</h2>
                <button class="btn-close modal-close-btn">&times;</button>
            </div>
            <form id="matterForm" class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label for="matterType">Matter Type</label>
                        <select id="matterType">
                            <option value="">-- Select --</option>
                            <option value="probate">Probate</option>
                            <option value="guardianship">Guardianship</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="matterCounty">County</label>
                        <input type="text" id="matterCounty">
                    </div>
                </div>
                <div class="form-group">
                    <label for="matterSubjectName">Subject Name <span id="matterSubjectHint" class="hint">(decedent or AIP)</span></label>
                    <input type="text" id="matterSubjectName">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="matterFileNo">File No. <span class="hint">(assigned after filing)</span></label>
                        <input type="text" id="matterFileNo">
                    </div>
                    <div class="form-group">
                        <label for="matterDivision">Division</label>
                        <input type="text" id="matterDivision">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary modal-close-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Matter</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="notification" style="display:none;"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display:none;">
        <div class="spinner"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3/dist/pizzip.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3/dist/pizzip-utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2/dist/FileSaver.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
